<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蚌院人物新闻</title>
  <style>
    :root {
      --bg: #f4f8fc;
      --panel: rgba(255, 255, 255, 0.96);
      --line: rgba(15, 23, 42, 0.1);
      --text: #0f172a;
      --muted: #475569;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --soft: #dbeafe;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.08), transparent 24%),
        linear-gradient(180deg, #f8fbff 0%, #eef5fb 100%);
    }

    .shell {
      width: min(1380px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .hero,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 34px 28px 30px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(239, 246, 255, 0.94)),
        var(--panel);
    }

    .hero-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 42px);
      letter-spacing: 0.5px;
    }

    .hero p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    .tag-button,
    .copy-button,
    .hero-link {
      border: 1px solid transparent;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .tag-button:hover,
    .copy-button:hover,
    .hero-link:hover {
      transform: translateY(-1px);
    }

    .hero-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 18px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.22);
    }

    .tag-button {
      padding: 10px 18px;
      background: rgba(255, 255, 255, 0.98);
      color: var(--primary-dark);
      border-color: rgba(37, 99, 235, 0.16);
      font-size: 15px;
      font-weight: 700;
    }

    .tag-button.is-active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.22);
    }

    .panel {
      margin-top: 22px;
      padding: 24px;
    }

    .list-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 18px;
    }

    .list-head h2 {
      margin: 0;
      font-size: 22px;
    }

    .hint,
    .count {
      color: var(--muted);
      font-size: 14px;
    }

    .item {
      padding: 18px 20px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(15, 23, 42, 0.08);
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--primary-dark);
      font-size: 13px;
      font-weight: 700;
    }

    .publish-time {
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .meta {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
    }

    .meta-box {
      padding: 12px 14px;
      border-radius: 14px;
      background: #f8fbff;
      border: 1px solid rgba(37, 99, 235, 0.1);
    }

    .meta-line {
      display: flex;
      justify-content: flex-start;
      gap: 12px;
      align-items: center;
      margin-bottom: 0;
    }

    .meta-value {
      line-height: 1.6;
      min-width: 0;
      flex: 1 1 auto;
    }

    .item-link {
      color: var(--primary);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-link:hover {
      text-decoration: underline;
    }

    .copy-button {
      min-width: 40px;
      height: 40px;
      padding: 0 12px;
      font-size: 18px;
      font-weight: 700;
      color: var(--primary-dark);
      background: #fff;
      border-color: rgba(37, 99, 235, 0.16);
      position: relative;
    }

    .status {
      min-height: 24px;
      margin-top: 16px;
      color: var(--primary-dark);
      font-size: 14px;
    }

    .copy-toast {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      z-index: 20;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.92);
      color: #fff;
      font-size: 12px;
      line-height: 1.4;
      white-space: nowrap;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 6px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .copy-toast::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 100%;
      width: 8px;
      height: 8px;
      background: rgba(15, 23, 42, 0.92);
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .copy-toast.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .field-label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      flex: 0 0 48px;
    }

    .empty {
      padding: 36px 16px;
      border-radius: 16px;
      border: 1px dashed rgba(37, 99, 235, 0.22);
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.82);
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100% - 18px, 1080px);
        padding-top: 18px;
      }

      .hero,
      .panel {
        padding: 18px;
      }

      .hero-head,
      .list-head,
      .item-top,
      .meta-line {
        flex-direction: column;
        align-items: flex-start;
      }

      .meta {
        grid-template-columns: 1fr;
      }

      .field-label {
        flex-basis: auto;
      }

      .item-link {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-head">
        <h1>蚌院人物新闻</h1>
        <a class="hero-link" href="http://192.168.105.71/login.jsp?inner=1" target="_blank" rel="noopener noreferrer">进入后台</a>
      </div>
      <p>集中查看蚌院人物相关文章，支持按栏目筛选，并快速打开原文。</p>
      <div class="toolbar" id="categoryTabs"></div>
    </section>

    <section class="panel">
      <div class="list-head">
        <div>
          <h2 id="listTitle">全部文章</h2>
          <div class="hint" id="lastUpdated">正在加载数据...</div>
        </div>
        <div class="count" id="itemCount"></div>
      </div>
      <div id="itemsRoot"></div>
      <div class="status" id="statusText"></div>
    </section>
  </main>
  <script src="./data/articles.js"></script>
  <script>
    const categories = [
      { id: "all", name: "全部" },
      { id: "qingchunbangyang", name: "青春榜样" },
      { id: "guojiangfengcai", name: "国奖风采" }
    ];

    const state = {
      activeCategory: "all",
      articles: [],
      metadata: {},
      statusTimer: null,
      activeToastTimer: null
    };

    const categoryTabs = document.getElementById("categoryTabs");
    const itemsRoot = document.getElementById("itemsRoot");
    const listTitle = document.getElementById("listTitle");
    const itemCount = document.getElementById("itemCount");
    const statusText = document.getElementById("statusText");
    const lastUpdated = document.getElementById("lastUpdated");
    renderTabs();
    loadData();

    async function loadData() {
      try {
        const response = await fetch("./data/articles.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("数据文件读取失败");
        }
        const payload = await response.json();
        state.articles = Array.isArray(payload.articles) ? payload.articles : [];
        state.metadata = payload.metadata || {};
        renderItems();
        lastUpdated.textContent = state.metadata.generated_at
          ? "最近更新：" + state.metadata.generated_at
          : "数据已加载";
      } catch (error) {
        if (window.__ARTICLES_DATA__) {
          state.articles = Array.isArray(window.__ARTICLES_DATA__.articles) ? window.__ARTICLES_DATA__.articles : [];
          state.metadata = window.__ARTICLES_DATA__.metadata || {};
          renderItems();
          lastUpdated.textContent = state.metadata.generated_at
            ? "最近更新：" + state.metadata.generated_at + "（本地模式）"
            : "数据已加载（本地模式）";
          setStatus("已切换到本地数据模式。");
          return;
        }

        lastUpdated.textContent = "数据加载失败";
        itemsRoot.innerHTML = '<div class="empty">还没有可用数据。请先运行抓取脚本或等待 GitHub Actions 生成文章列表。</div>';
        setStatus("未能读取 data/articles.json。");
      }
    }

    function renderTabs() {
      categoryTabs.innerHTML = "";
      categories.forEach((category) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "tag-button" + (state.activeCategory === category.id ? " is-active" : "");
        button.textContent = category.name;
        button.addEventListener("click", () => {
          state.activeCategory = category.id;
          renderTabs();
          renderItems();
        });
        categoryTabs.appendChild(button);
      });
    }

    function renderItems() {
      const activeCategory = categories.find((item) => item.id === state.activeCategory);
      const filtered = state.activeCategory === "all"
        ? [...state.articles]
        : state.articles.filter((article) => article.category === state.activeCategory);

      filtered.sort((left, right) => String(right.published_at).localeCompare(String(left.published_at)));

      listTitle.textContent = state.activeCategory === "all" ? "全部文章" : activeCategory.name + " 文章";
      itemCount.textContent = "共 " + filtered.length + " 篇";

      if (!filtered.length) {
        itemsRoot.innerHTML = '<div class="empty">这个分类暂时没有内容。</div>';
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "items";

      filtered.forEach((article) => {
        const category = categories.find((item) => item.id === article.category);
        const card = document.createElement("article");
        card.className = "item";
        card.innerHTML = `
          <div class="item-top">
            <span class="pill">${escapeHtml(category ? category.name : "未分类")}</span>
            <span class="publish-time">发布时间：${escapeHtml(article.published_at || "")}</span>
          </div>
          <div class="meta">
            <div class="meta-box">
              <div class="meta-line">
                <span class="field-label">标题</span>
                <div class="meta-value">${escapeHtml(article.title)}</div>
                <button class="copy-button" type="button" title="复制标题">⧉</button>
              </div>
            </div>
            <div class="meta-box">
              <div class="meta-line">
                <span class="field-label">链接</span>
                <a class="item-link meta-value" href="${escapeHtml(article.url)}" target="_blank" rel="noreferrer">${escapeHtml(article.url)}</a>
                <button class="copy-button" type="button" title="复制链接">⧉</button>
              </div>
            </div>
          </div>
        `;

        const [copyTitleButton, copyUrlButton] = card.querySelectorAll(".copy-button");
        copyTitleButton.addEventListener("click", () => copyText(article.title, "标题复制成功", copyTitleButton));
        copyUrlButton.addEventListener("click", () => copyText(article.url, "链接复制成功", copyUrlButton));
        wrapper.appendChild(card);
      });

      itemsRoot.innerHTML = "";
      itemsRoot.appendChild(wrapper);
    }

    async function copyText(text, successMessage, button) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          fallbackCopy(text);
        }
        setStatus(successMessage, button);
      } catch (error) {
        try {
          fallbackCopy(text);
          setStatus(successMessage, button);
        } catch (fallbackError) {
          setStatus("复制失败，可能是浏览器限制。", button);
        }
      }
    }

    function fallbackCopy(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      document.body.removeChild(textarea);
    }

    function setStatus(message, button) {
      statusText.textContent = message;
      if (state.statusTimer) {
        window.clearTimeout(state.statusTimer);
      }
      if (message) {
        showCopyToast(message, button);
        state.statusTimer = window.setTimeout(() => {
          statusText.textContent = "";
        }, 1800);
      }
    }

    function showCopyToast(message, button) {
      document.querySelectorAll(".copy-toast").forEach((node) => node.remove());
      if (!button) {
        return;
      }

      const toast = document.createElement("span");
      toast.className = "copy-toast";
      toast.textContent = message;
      button.appendChild(toast);

      requestAnimationFrame(() => {
        toast.classList.add("is-visible");
      });

      if (state.activeToastTimer) {
        window.clearTimeout(state.activeToastTimer);
      }

      state.activeToastTimer = window.setTimeout(() => {
        toast.classList.remove("is-visible");
        window.setTimeout(() => toast.remove(), 180);
      }, 1400);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
  </script>
</body>
</html>
