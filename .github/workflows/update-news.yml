name: Update News Data

on:
  workflow_dispatch:
    inputs:
      force_notify:
        description: "即使没有新文章也发送一条测试推送"
        required: false
        default: "false"
  schedule:
    - cron: "7 1 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Update article data
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          FORCE_NOTIFY: ${{ github.event.inputs.force_notify || 'false' }}
        run: python3 scripts/update_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.json data/articles.js
          git diff --cached --quiet && exit 0
          git commit -m "chore: update news data"
          git push
